apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: dev-infrastructure
  namespace: argocd

spec:
  generators:
    - list:
        elements:
          - name: ingress
            path: infrastructure/ingress
            namespace: kube-system

  template:
    metadata:
      name: '{{name}}-dev'

    spec:
      project: default

      source:
        repoURL: https://github.com/<org>/gitops-repo.git
        targetRevision: main
        path: '{{path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: staging-platform-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Emmy-github-webdev/Kubernetes-argocd.git
    targetRevision: main
    path: argocd/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform

spec:

  source:
    repoURL: https://github.com/company/gitops-repo.git
    path: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  project: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
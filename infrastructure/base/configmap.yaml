apiVersion: v1
kind: ConfigMap

metadata:
  name: postgres-init-sql
  annotations:
    argocd.argoproj.io/sync-wave: "1"

data:
  init.sql: |
    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT FROM pg_roles WHERE rolname = 'order_user'
      ) THEN
        CREATE ROLE order_user LOGIN PASSWORD '${ORDER_PASSWORD}';
      END IF;
    END $$;

    SELECT 'CREATE DATABASE orderdb OWNER order_user'
    WHERE NOT EXISTS (
      SELECT FROM pg_database WHERE datname='orderdb'
    )\gexec

    GRANT CONNECT ON DATABASE orderdb TO order_user;

    \connect orderdb

    GRANT USAGE, CREATE ON SCHEMA public TO order_user;



    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT FROM pg_roles WHERE rolname = 'payment_user'
      ) THEN
        CREATE ROLE payment_user LOGIN PASSWORD '${PAYMENT_PASSWORD}';
      END IF;
    END $$;

    SELECT 'CREATE DATABASE paymentdb OWNER payment_user'
    WHERE NOT EXISTS (
      SELECT FROM pg_database WHERE datname='paymentdb'
    )\gexec

    GRANT CONNECT ON DATABASE paymentdb TO payment_user;

    \connect paymentdb

    GRANT USAGE, CREATE ON SCHEMA public TO payment_user;



    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT FROM pg_roles WHERE rolname = 'product_user'
      ) THEN
        CREATE ROLE product_user LOGIN PASSWORD '${PRODUCT_PASSWORD}';
      END IF;
    END $$;

    SELECT 'CREATE DATABASE productdb OWNER product_user'
    WHERE NOT EXISTS (
      SELECT FROM pg_database WHERE datname='productdb'
    )\gexec

    GRANT CONNECT ON DATABASE productdb TO product_user;

    \connect productdb

    GRANT USAGE, CREATE ON SCHEMA public TO product_user;



    DO $$
    BEGIN
      IF NOT EXISTS (
        SELECT FROM pg_roles WHERE rolname = 'user_user'
      ) THEN
        CREATE ROLE user_user LOGIN PASSWORD '${USER_PASSWORD}';
      END IF;
    END $$;

    SELECT 'CREATE DATABASE userdb OWNER user_user'
    WHERE NOT EXISTS (
      SELECT FROM pg_database WHERE datname='userdb'
    )\gexec

    GRANT CONNECT ON DATABASE userdb TO user_user;

    \connect userdb

    GRANT USAGE, CREATE ON SCHEMA public TO user_user;
apiVersion: batch/v1
kind: Job

metadata:
  name: postgres-init
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  backoffLimit: 3

  template:
    spec:
      restartPolicy: Never

      containers:
        - name: postgres-init

          image: postgres:16

          command:
            - sh
            - -c
            - |
              until pg_isready -h "$DB_HOST" -U "$DB_USER"; do
                echo "Waiting for PostgreSQL..."
                sleep 10
              done

              envsubst < /sql/init.sql > /tmp/init.sql

              psql \
                -h "$DB_HOST" \
                -p "$DB_PORT" \
                -U "$DB_USER" \
                -d postgres \
                -f /tmp/init.sql

          env:

            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-master
                  key: password

            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-master
                  key: host

            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres-master
                  key: port

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-master
                  key: username

            - name: ORDER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-db
                  key: password

            - name: PAYMENT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db
                  key: password

            - name: PRODUCT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-db
                  key: password

            - name: USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-db
                  key: password

          volumeMounts:
            - name: sql
              mountPath: /sql

      volumes:
        - name: sql
          configMap:
            name: postgres-init-sql 
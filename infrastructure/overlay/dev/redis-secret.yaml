apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secret
  namespace: dev

spec:
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: redis-secret
    creationPolicy: Owner

  data:
    - secretKey: host
      remoteRef:
        key: /dev/redis/cache
        property: host

    - secretKey: port
      remoteRef:
        key: /dev/redis/cache
        property: port
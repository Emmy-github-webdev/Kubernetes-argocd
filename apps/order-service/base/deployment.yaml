apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service

    spec:
      containers:

      - name: order-service

        # image: 123456789.dkr.ecr.eu-central-1.amazonaws.com/user-service:latest
        image: 579871530627.dkr.ecr.us-east-1.amazonaws.com/test:latest

        ports:
        - containerPort: 8083
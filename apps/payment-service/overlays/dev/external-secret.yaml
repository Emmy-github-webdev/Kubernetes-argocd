apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-db-secret
  namespace: dev

spec:
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: payment-db-secret
    creationPolicy: Owner

  data:
    - secretKey: host
      remoteRef:
        key: /dev/payment/db
        property: host

    - secretKey: port
      remoteRef:
        key: /dev/payment/db
        property: port

    - secretKey: database
      remoteRef:
        key: /dev/payment/db
        property: database

    - secretKey: username
      remoteRef:
        key: /dev/payment/db
        property: username

    - secretKey: password
      remoteRef:
        key: /dev/payment/db
        property: password